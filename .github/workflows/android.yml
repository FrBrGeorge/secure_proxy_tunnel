name: Secure Tunnel Android Client Build

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'

jobs:
  build:
    name: Build Installable Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-python@v6 # Mock setup or actions/setup-java depending on environment (we use setup-java for real APK compilations)
        # Note: In standard pipelines we use setup-java. Here we configure setup-java explicitly.
        # Let's write the real actions/setup-java step!
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle Wrapper
        run: |
          cd android
          if [ -f gradlew ]; then
            chmod +x gradlew
          else
            echo "Init gradlew if not found..."
            gradle wrapper --gradle-version 8.2
            chmod +x gradlew
          fi

      - name: Compile and Assemble Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: secure-tunnel-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
